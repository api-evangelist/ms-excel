name: Microsoft Excel API
description: APIs for interacting with Microsoft Excel files and workbooks through Microsoft Graph
image: https://www.microsoft.com/en-us/microsoft-365/excel
tags:
- Spreadsheets
- Excel
- Microsoft Graph
- Office 365
- Data Analysis
created: '2024'
modified: '2024'
url: https://developer.microsoft.com/en-us/graph/docs/api-reference/v1.0/resources/excel
specificationVersion: '0.18'
apis:
- name: Microsoft Graph Excel API
  description: REST API for accessing Excel workbooks stored in OneDrive, SharePoint, and other Microsoft 365 storage locations
  image: https://learn.microsoft.com/graph/images/office-graph.png
  humanURL: https://learn.microsoft.com/en-us/graph/api/resources/excel
  baseURL: https://graph.microsoft.com/v1.0
  tags:
  - Excel
  - Workbooks
  - Worksheets
  - Tables
  - Charts
  properties:
  - type: Documentation
    url: https://learn.microsoft.com/en-us/graph/api/resources/excel
  - type: OpenAPI
    url: https://raw.githubusercontent.com/microsoftgraph/msgraph-metadata/master/openapi/v1.0/openapi.yaml
  - type: Authentication
    url: https://learn.microsoft.com/en-us/graph/auth/
  - type: Getting Started
    url: https://learn.microsoft.com/en-us/graph/api/resources/excel#get-started
  - type: SDKs
    url: https://learn.microsoft.com/en-us/graph/sdks/sdks-overview
  - type: Pricing
    url: https://www.microsoft.com/en-us/microsoft-365/enterprise/compare-office-365-plans
  endpoints:
  - name: Get Workbook
    method: GET
    path: /me/drive/items/{id}/workbook
    description: Retrieve the properties and relationships of workbook object
  - name: Create Session
    method: POST
    path: /me/drive/items/{id}/workbook/createSession
    description: Create a new workbook session
  - name: Get Worksheet
    method: GET
    path: /me/drive/items/{id}/workbook/worksheets/{worksheet-id}
    description: Retrieve the properties and relationships of worksheet object
  - name: List Worksheets
    method: GET
    path: /me/drive/items/{id}/workbook/worksheets
    description: Retrieve a list of worksheet objects
  - name: Add Worksheet
    method: POST
    path: /me/drive/items/{id}/workbook/worksheets/add
    description: Add a new worksheet to the workbook
  - name: Get Range
    method: GET
    path: /me/drive/items/{id}/workbook/worksheets/{worksheet-id}/range(address='{address}')
    description: Retrieve the properties and relationships of range object
  - name: Update Range
    method: PATCH
    path: /me/drive/items/{id}/workbook/worksheets/{worksheet-id}/range(address='{address}')
    description: Update the properties of range object
  - name: List Tables
    method: GET
    path: /me/drive/items/{id}/workbook/tables
    description: Retrieve a list of table objects
  - name: Add Table
    method: POST
    path: /me/drive/items/{id}/workbook/tables/add
    description: Create a new table
  - name: List Charts
    method: GET
    path: /me/drive/items/{id}/workbook/worksheets/{worksheet-id}/charts
    description: Retrieve a list of chart objects
  - name: Create Chart
    method: POST
    path: /me/drive/items/{id}/workbook/worksheets/{worksheet-id}/charts/add
    description: Create a new chart
